name: Android release APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare version
        shell: bash
        run: |
          VERSION_CODE=$((20710 + GITHUB_RUN_NUMBER))
          VERSION_NAME="V2.7.9-ai-${GITHUB_SHA::7}"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"

      - name: Decode release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/obd-release.jks"
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/obd-release.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :androbd:assembleRelease --no-daemon --max-workers=2

      - name: Write release notes
        run: |
          cat > "$RUNNER_TEMP/release-notes.txt" <<'EOF'
            version_code=${{ env.VERSION_CODE }}
            version_name=${{ env.VERSION_NAME }}
            commit=${{ github.sha }}
          EOF

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "app-${GITHUB_RUN_NUMBER}" \
            "androbd/build/outputs/apk/release/androbd-release.apk" \
            --repo "$GITHUB_REPOSITORY" \
            --title "OBD APP ${VERSION_NAME}" \
            --notes-file "$RUNNER_TEMP/release-notes.txt" \
            --latest
