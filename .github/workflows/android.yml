name: Android CI

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 17
    - name: Build with Gradle
      run: ./gradlew build
